<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Sarah's Lines — Inside the Lines</title>
  <style>
    :root {
      --bg: #fdf5fa;
      --card: #fff0f7;
      --card2: #fce8f4;
      --pink: #d44d8a;
      --pink-dim: #c07098;
      --pink-light: #a83070;
      --text: #3a1a2e;
      --text-dim: #907088;
      --mauve: #7a50a0;
      --learned: #9030a0;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 2rem;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      width: 100%;
      background: #f5e8f0;
      border-bottom: 1px solid #d8a8c8;
      padding: 0.8rem 1.5rem;
      text-align: center;
    }
    header h1 {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink-light);
      font-weight: normal;
    }
    header .subtitle {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    /* ── Layout ──────────────────────────────────── */
    .main { width: 100%; max-width: 680px; padding: 0 1rem; }

    /* ── Progress ────────────────────────────────── */
    .progress-wrap {
      padding: 1rem 0 0.5rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
    }
    .bar-track {
      height: 3px;
      background: #e8cce0;
      border-radius: 2px;
    }
    .bar-fill {
      height: 100%;
      background: var(--pink);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .dots {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 0.5rem;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #e8cce0;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .dot:hover { transform: scale(1.4); }
    .dot.learned { background: var(--learned); }
    .dot.current { background: var(--pink); box-shadow: 0 0 6px var(--pink); }
    .dot.learned.current { background: var(--pink); }

    /* ── Context strip ───────────────────────────── */
    .context-strip {
      margin-top: 1rem;
      border-left: 2px solid #d0a0c0;
      padding: 0 0 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .ctx-block { opacity: 0.55; font-size: 0.82rem; line-height: 1.5; }
    .ctx-block .ctx-who {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.15rem;
    }
    .ctx-block .ctx-text { color: var(--text-dim); }
    .ctx-block .stage-dir { font-style: italic; color: var(--mauve); }

    /* ── Cue box ─────────────────────────────────── */
    .cue-box {
      margin-top: 0.75rem;
      background: var(--card);
      border: 1px solid #d0a0c0;
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
    }
    .cue-label {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.45rem;
    }
    .cue-who {
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }
    .cue-text {
      font-size: 0.98rem;
      line-height: 1.65;
    }
    .cue-paren {
      font-style: italic;
      color: var(--text-dim);
      margin-bottom: 0.2rem;
      font-size: 0.88rem;
    }

    /* ── Sarah's line ────────────────────────────── */
    .sarah-box {
      margin-top: 0.75rem;
      background: var(--card2);
      border: 1px solid #c898b8;
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      cursor: pointer;
      position: relative;
      min-height: 90px;
      transition: border-color 0.2s;
    }
    .sarah-box:hover { border-color: var(--pink-dim); }
    .sarah-box.revealed { cursor: default; border-color: #d0a0c0; }

    .sarah-inner { transition: filter 0.25s; }
    .sarah-box:not(.revealed) .sarah-inner {
      filter: blur(5px);
      user-select: none;
      pointer-events: none;
    }

    .reveal-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(253,245,250,0.80);
      border-radius: calc(var(--radius) - 1px);
      pointer-events: none;
      padding: 1rem;
    }
    .sarah-box.revealed .reveal-overlay { display: none; }

    /* hint words shown inside the overlay */
    .rov-words {
      font-size: 1.45rem;
      color: var(--pink-light);
      font-style: italic;
      text-align: center;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(224,82,154,0.8);
      line-height: 1.4;
    }
    .rov-words:empty { display: none; }
    /* when words are showing, shrink the "tap to reveal" prompt */
    .rov-words:not(:empty) ~ .rov-prompt .rov-hint { display: none; }
    .rov-words:not(:empty) ~ .rov-prompt .rov-label { font-size: 0.72rem; }

    .rov-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .rov-label {
      font-size: 0.88rem;
      color: var(--pink-light);
      letter-spacing: 0.05em;
    }
    .rov-hint {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .s-label {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--pink-dim);
      margin-bottom: 0.45rem;
    }
    .s-who {
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: var(--pink-light);
      margin-bottom: 0.3rem;
    }
    .s-paren {
      font-style: italic;
      color: var(--text-dim);
      margin-bottom: 0.2rem;
      font-size: 0.88rem;
    }
    .s-text {
      font-size: 1.02rem;
      line-height: 1.68;
      color: var(--pink-light);
    }

    /* ── Controls ────────────────────────────────── */
    .controls {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .nav-row {
      display: flex;
      gap: 0.5rem;
    }
    btn, button {
      font-family: inherit;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.82rem;
      padding: 0.55rem 0.9rem;
      border: 1px solid #d0a0c0;
      background: #fff0f7;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
    }
    button:hover { background: #ede0ea; border-color: #c090b0; }
    button:active { background: #f0e0ec; }
    .btn-prev, .btn-next { flex: 1; }
    .btn-hint {
      background: #fce8f4;
      border-color: var(--pink-dim);
      color: var(--pink-light);
      font-weight: bold;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .btn-hint:hover { background: #f4d0e8; border-color: var(--pink); color: #fff; }
    .btn-hint:disabled { opacity: 0.3; cursor: default; }
    .btn-learned {
      background: #f8eeff;
      border-color: #c898c0;
      color: #8040a0;
      white-space: nowrap;
    }
    .btn-learned.on {
      background: var(--learned);
      border-color: var(--learned);
      color: #fff;
    }
    .opt-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .jump-input {
      width: 72px;
      background: #fef5fc;
      border: 1px solid #d0a0c0;
      color: var(--text);
      border-radius: 6px;
      padding: 0.5rem 0.5rem;
      font-family: inherit;
      font-size: 0.82rem;
      text-align: center;
    }
    .jump-input:focus { outline: none; border-color: var(--pink-dim); }
    .filter-label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--text-dim);
      cursor: pointer;
      margin-left: auto;
    }
    .filter-label input { accent-color: var(--pink); cursor: pointer; }
    .kbd-hint {
      font-size: 0.67rem;
      color: var(--text-dim);
      text-align: center;
    }
    kbd {
      background: #fff0f7;
      border: 1px solid #d0a8c8;
      border-radius: 3px;
      padding: 0.1em 0.3em;
      font-family: monospace;
      font-size: 0.85em;
    }

    /* ── Mic / speech check ──────────────────────────── */
    .mic-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .btn-mic {
      background: #fce8f4;
      border-color: var(--pink-dim);
      color: var(--pink);
      font-weight: bold;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .btn-mic:hover { background: #f4d8ec; border-color: var(--pink); }
    .btn-mic.listening {
      background: var(--pink);
      border-color: var(--pink);
      color: #fff;
      animation: mic-pulse 1.2s ease-in-out infinite;
    }
    .btn-mic:disabled { opacity: 0.35; cursor: default; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,77,138,0.5); }
      50%       { box-shadow: 0 0 0 7px rgba(212,77,138,0); }
    }
    .speech-status {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-style: italic;
    }
    .speech-result {
      display: none;
      margin-top: 0.75rem;
      padding: 0.9rem 1.1rem;
      background: #fff0f7;
      border: 1px solid #d0a0c0;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .speech-result.show { display: block; }
    .sr-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }
    .sr-score {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.55rem;
    }
    .w-ok   { color: #2a7a2a; }
    .w-bad  { background: #ffc8d4; color: #900020; border-radius: 3px; padding: 0 3px; }
    .w-miss { background: #ffe8a8; color: #7a4400; border-radius: 3px; padding: 0 3px; text-decoration: line-through; cursor: pointer; }
    .w-miss:hover { background: #ffd060; }
    .sr-hint { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.3rem; font-style: italic; }

    /* ── Dark mode toggle button ─────────────────────── */
    .dark-toggle-wrap {
      width: 100%;
      text-align: center;
      padding: 1.5rem 0 1rem;
    }
    .btn-dark-toggle {
      background: transparent;
      border: 1px solid #d0a0c0;
      color: var(--text-dim);
      font-size: 0.75rem;
      padding: 0.35rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-dark-toggle:hover { background: var(--card); border-color: var(--pink-dim); }

    /* ── Dark mode overrides ─────────────────────────── */
    body.dark {
      --bg: #140a12;
      --card: #1e101c;
      --card2: #261428;
      --pink: #e0529a;
      --pink-dim: #7a2855;
      --pink-light: #f4a8cc;
      --text: #f2e8f0;
      --text-dim: #8a6880;
      --mauve: #9a70aa;
      --learned: #b040a8;
    }
    body.dark header { background: #0e0610; border-bottom-color: #4a1a38; }
    body.dark .bar-track { background: #2e1828; }
    body.dark .dot { background: #2e1828; }
    body.dark .context-strip { border-left-color: #3a1830; }
    body.dark .cue-box { background: var(--card); border-color: #3a1830; }
    body.dark .sarah-box { background: var(--card2); border-color: #4a1a3a; }
    body.dark .sarah-box.revealed { border-color: #3a1830; }
    body.dark .reveal-overlay { background: rgba(20,10,18,0.65); }
    body.dark button { background: #1e101c; border-color: #3a1830; color: var(--text); }
    body.dark button:hover { background: #28142a; border-color: #4a2040; }
    body.dark button:active { background: #180c18; }
    body.dark .btn-hint { background: #280f20; border-color: var(--pink-dim); color: var(--pink-light); }
    body.dark .btn-hint:hover { background: #381228; border-color: var(--pink); color: #fff; }
    body.dark .btn-learned { background: #1a0c20; border-color: #4a1a48; color: #c070c0; }
    body.dark .btn-learned.on { background: var(--learned); border-color: var(--learned); color: #fff; }
    body.dark .btn-mic { background: #280f20; border-color: var(--pink-dim); color: var(--pink-light); }
    body.dark .btn-mic:hover { background: #381228; border-color: var(--pink); }
    body.dark .jump-input { background: #1a0c18; border-color: #3a1830; color: var(--text); }
    body.dark kbd { background: #1e101c; border-color: #3e1e3a; }
    body.dark .speech-result { background: #1e101c; border-color: #3a1830; }
    body.dark .w-ok  { color: #70d070; }
    body.dark .w-bad { background: #500010; color: #ffa0b0; }
    body.dark .w-miss { background: #4a3000; color: #ffd080; }
    body.dark .w-miss:hover { background: #6a4400; }
    body.dark .btn-dark-toggle { border-color: #3a1830; }
    body.dark .btn-dark-toggle:hover { background: var(--card); }
  </style>
</head>
<body>

<header>
  <h1>Inside the Lines</h1>
  <div class="subtitle">Learning SARAH's Lines</div>
</header>

<div class="main">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="counter">— of —</span>
      <span id="learned-count">0 learned</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="context-strip" id="context-strip"></div>

  <div class="cue-box" id="cue-box">
    <div class="cue-label">Your Cue</div>
    <div id="cue-who" class="cue-who"></div>
    <div id="cue-paren" class="cue-paren"></div>
    <div id="cue-text" class="cue-text"></div>
  </div>

  <div class="sarah-box" id="sarah-box" onclick="handleBoxClick()">
    <div class="reveal-overlay">
      <div class="rov-words" id="hint-text"></div>
      <div class="rov-prompt">
        <div class="rov-label">Tap to reveal your line</div>
        <div class="rov-hint">or press <kbd>Space</kbd></div>
      </div>
    </div>
    <div class="sarah-inner">
      <div class="s-label">Sarah's Line</div>
      <div id="s-who" class="s-who"></div>
      <div id="s-paren" class="s-paren"></div>
      <div id="s-text" class="s-text"></div>
    </div>
  </div>

  <div class="speech-result" id="speech-result">
    <div class="sr-label">You said</div>
    <div id="sr-diff"></div>
    <div class="sr-score" id="sr-score"></div>
  </div>

  <div class="controls">
    <div class="mic-row">
      <button class="btn-mic" id="btn-mic" onclick="toggleMic()">🎤 Say It</button>
      <button class="btn-learned" id="btn-learned" onclick="toggleLearned()" disabled>&#9744; Mark Learned</button>
      <div class="speech-status" id="speech-status"></div>
    </div>
    <div class="nav-row">
      <button class="btn-prev" onclick="go(-1)">&#8592; Previous</button>
      <button class="btn-hint" id="btn-hint" onclick="revealHint()">LINE!</button>
      <button class="btn-next" onclick="go(1)">Next &#8594;</button>
    </div>
    <div class="opt-row">
      <span style="font-size:0.78rem;color:var(--text-dim)">Jump to line:</span>
      <input class="jump-input" id="jump-in" type="number" min="1" placeholder="#"
             onkeydown="if(event.key==='Enter') jumpTo()">
      <button onclick="jumpTo()">Go</button>
      <button onclick="shuffle()" title="Shuffle unlearned lines">&#8635; Shuffle</button>
      <label class="filter-label">
        <input type="checkbox" id="skip-learned" onchange="applyFilter()"> Skip learned
      </label>
    </div>
    <div class="kbd-hint">
      <kbd>&#8592;</kbd><kbd>&#8594;</kbd> navigate &nbsp;&middot;&nbsp;
      <kbd>Space</kbd> reveal &nbsp;&middot;&nbsp;
      <kbd>L</kbd> toggle learned &nbsp;&middot;&nbsp;
      <kbd>S</kbd> shuffle &nbsp;&middot;&nbsp;
      <kbd>R</kbd> record
    </div>
  </div>
</div>

<div class="dark-toggle-wrap">
  <button class="btn-dark-toggle" id="btn-dark" onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<script id="md-src" type="text/x-markdown">
# Inside the Lines

*[lights up on SARAH, FRED, and DANA in bed. Various actors in tableau represent other community members getting ready for their day. **SOUND CUE 1:** Alarm clock goes off. **SOUND CUE 2:** Pleasant music underscores morning routine.]*

**DEVICE 1-3**
Five o’ clock, time to wake up! Good morning, citizens! Time to prepare for work! Please recite
the Code of Conduct.

**SARAH, FRED, DANA COOPER**
(Cheerfully) I will work hard every day to be a productive member of society. I will trust, and
follow my life-plan, and I will always be happy.

**DEVICE 1**
Thank you, Sarah! Let’s start our morning: please apply the foundation to your face.

**SARAH**
The liquid or the powder?

**DEVICE 1**
Today will be sunny, so you will be wearing the liquid foundation with SPF-30.

*[scans SARAH for proof of applying foundation]*

**DEVICE 2**
Good Morning, Fred. Today you will have a romantic dinner with Sarah. Please be sure to tie a
Windsor knot.

**FRED**
You betcha!

**DEVICE 1**
As you know, Sarah, today is the first day of the new school-year, so the goal for today’s look is
to be “approachable” to your teachers and students.

**SARAH**
Should I apply the bronze or the silver eye-shadow?

**DEVICE 1**
Bronze.

*[SARAH applies the eyeshadow.]*

**DEVICE 1**
Bing!
That is too much, Sarah. Wash it off, and try again with gentle hands.

**DEVICE 3**
Dana, you have one hour before this morning’s studio broadcast. Please whiten your teeth now.

**DANA COOPER**
What are today’s top stories?

**DEVICE 3**
Today’s report will focus on the arrival of Earhart’s comet…

*[Word collage begins with DEVICES barraging SARAH, FRED, and DANA with instructions.]*

**DEVICE 1**
Apply the light pink lipstick next

**DEVICE 2**
You will order one coffee with milk and no sugar for yourself, and one coffee with extra sugar
and extra cream for Sarah. It will brighten her morning.

**DEVICE 3**
Then community safety reminders, including the importance of traffic safety with the start of
the new school year…

**DEVICE 2**
Adjust your tie

**DEVICE 3**
Smile for the camera, it’s important to establish trust with your audience

**DEVICE 1**
Wear your cardigan today, it will make you appear more approachable to your new class.

*[SARAH applies a yellow cardigan.]*

**SARAH**
There. Am I approachable now?

**DEVICE 1**
More than you were before.

**DEVICES 1-3**
Don’t be late.

*[Lights shift, SARAH walks to school. She sees a crowd of children arguing]*

**ELIZABETH**
Let’s play Life-Plan!

**JOSHUA**
Girls, YOU prepare dinner, and I’ll come home from work and eat it.

**ELIZABETH**
Joshua, you have to be my assigned partner!

**JOSHUA**
Ew no! I’m not meant to do that!

**ELIZABETH**
Why not?

**JOSHUA**
Because I’m obviously meant to be Emma’s life partner. Emma, what’s for dinner?

**EMMA**
Meatloaf!

**ELIZABETH**
But then I’m just a single...

**KATE**
I’ll be your assigned partner, Elizabeth!

**JOSH**
You can’t do that!

**KATE**
Why not?

**EMMA**
It has to be boy/girl. It can’t be girl/girl. That’s not how it works.

**KATE**
You’re lying!

**JOSHUA**
Nope. Sorry. You have to play something different. Or you can both be singles with hundreds of
cats.

**ELIZABETH**
NO!

*[**SOUND CUE 3:** News Cast theme music. The children turn their attention to the video billboard.]*

**DEVICE 3**
Dana, remember to look confident. The people are relying on you to tell them everything they
need to know. We’re live in 5, 4, 3, 2….

**DANA COOPER**
Good morning, CITIZENS.

**DEVICE 3**
Bing
Enunciate.

**DANA COOPER**
*(Taking care to perfectly pronounce each word.)*
Today on Fact Based Media we have a breathtaking announcement. This evening there will be a
very rare sighting of Earhart’s Comet as it passes through our orbit. This celestial phenomenon
will not pass our planet again for another 1200 years, but thanks to our dear friends at Life Corp
you will be able to watch a livestream of its track on your devices starting at 8:38 p.m. What
would we do without them?

*[DANA chuckles]*

**EMMA**
(To Elizabeth) What’s a comet?

**DANA**
A reminder to all of our community members, today marks the first day of the new school year.
Our friends at Life Corp wish all students a wonderful first day of school.

**KATE**
That’s US!

**DANA**
And now for our exceptional citizen report. Today we remember Dan Hartstone, who held a
perfect record for 70 years of waking up at precisely 4:00 a.m. He was efficient in his daily
commute, and was never late a day in his life. After marrying his assigned life-partner at age 22,
he fathered 3 children who went on to develop emerging technologies for LifeCorp. Dan’s
contributions to our community included delivering food to the elderly, and keeping the tidiest
front lawn. Thank you Dan Hartstone for your productive and important life

*[SARAH calls the children into class.]*

**SARAH**
Children, please take your seats before the bell rings!

*[CHILDREN run into the building. FRED enters, carrying a paper coffee cup.]*

**FRED**
Good morning Sarah, I brought you coffee, extra cream, extra sugar.

*[SARAH gives FRED a quick kiss on the cheek]*

**KIDS**

*[Lights shift to news scene. SARAH joins DANA COOPER center.]*

**SARAH**

*[SARAH faces the camera]*

**SARAH**
I am so sorry to anyone I may have upset by my actions. I realize now that the things I say and

</script>

<script>
// ── Parse markdown ──────────────────────────────────────────────────────────
function parseMd(text) {
  const lines = text.split('\n');
  const elements = [];
  let pendingStage = null;

  for (const raw of lines) {
    const t = raw.trim();
    if (!t) continue;

    // Title
    if (t.startsWith('# ')) {
      if (pendingStage) { elements.push({type:'stage_dir',text:pendingStage}); pendingStage=null; }
      elements.push({type:'title', text:t.slice(2).trim()});
      continue;
    }

    // Bold character name: **...**  (must not start with **)
    const boldMatch = t.match(/^\*\*([^*]+)\*\*$/);
    if (boldMatch) {
      const inner = boldMatch[1].trim();
      if (!inner.startsWith('[')) {
        if (pendingStage) { elements.push({type:'stage_dir',text:pendingStage}); pendingStage=null; }
        elements.push({type:'character', speaker:inner});
        continue;
      }
    }

    // Italic *...*
    if (t.startsWith('*') && !t.startsWith('**')) {
      let inner = (t.startsWith('*') && t.endsWith('*') && t.length > 1)
        ? t.slice(1,-1) : t.slice(1);
      // Strip any bold markers inside for display simplicity
      inner = inner.replace(/\*\*/g, '');

      if (pendingStage !== null) {
        pendingStage += ' ' + inner;
        if (inner.includes(']')) {
          elements.push({type:'stage_dir', text:pendingStage});
          pendingStage = null;
        }
      } else if (inner.startsWith('[')) {
        if (inner.includes(']')) {
          elements.push({type:'stage_dir', text:inner});
        } else {
          pendingStage = inner;
        }
      } else if (inner.startsWith('(')) {
        elements.push({type:'parenthetical', text:inner});
      } else {
        elements.push({type:'dialogue', text:inner});
      }
      continue;
    }

    // Plain text
    if (pendingStage !== null) { elements.push({type:'stage_dir',text:pendingStage}); pendingStage=null; }
    elements.push({type:'dialogue', text:t});
  }
  if (pendingStage) elements.push({type:'stage_dir',text:pendingStage});
  return elements;
}

function buildBlocks(elements) {
  const blocks = [];
  let cur = null;
  for (const el of elements) {
    if (el.type === 'character') {
      if (cur) blocks.push(cur);
      cur = {type:'speech', speaker:el.speaker, parenthetical:'', text:''};
    } else if (el.type === 'parenthetical' && cur) {
      cur.parenthetical = el.text;
    } else if (el.type === 'dialogue' && cur) {
      cur.text = cur.text ? cur.text + ' ' + el.text : el.text;
    } else if (el.type === 'stage_dir') {
      if (cur) { blocks.push(cur); cur = null; }
      blocks.push({type:'stage_dir', text:el.text});
    }
  }
  if (cur) blocks.push(cur);
  return blocks;
}

function isSarah(spk) {
  return /SARAH/.test(spk.toUpperCase());
}

function buildSarahLines(blocks) {
  const lines = [];
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    if (b.type !== 'speech' || !isSarah(b.speaker)) continue;

    // Gather up to 3 preceding blocks as context
    const ctx = [];
    for (let j = Math.max(0, i-3); j < i; j++) ctx.push(blocks[j]);

    // Immediate cue = last preceding speech (non-Sarah preferred)
    // Walk back until we find a non-Sarah speech; if none, use any speech or stage dir
    let cue = null;
    for (let j = i-1; j >= 0; j--) {
      if (blocks[j].type === 'speech') { cue = blocks[j]; break; }
      if (blocks[j].type === 'stage_dir' && !cue) { cue = blocks[j]; }
    }

    // Clean up text: strip trailing bing sounds that leaked from PDF
    const rawText = b.text.trim();
    let text = rawText.replace(/\s*bing!?\s*$/i, '').trim();

    // Extract inline leading parenthetical e.g. "(happily) Wow!" → paren + clean text
    let parenthetical = b.parenthetical || '';
    if (!parenthetical) {
      const pm = text.match(/^\(([^)]*)\)\s+/);
      if (pm) { parenthetical = pm[0].trim(); text = text.slice(pm[0].length); }
    }

    lines.push({
      speaker: b.speaker,
      parenthetical,
      text,
      cue,
      context: ctx,
      blockIdx: i,
    });
  }
  return lines;
}

// ── Data ────────────────────────────────────────────────────────────────────
const RAW_MD = document.getElementById('md-src').textContent;
const elements = parseMd(RAW_MD);
const blocks   = buildBlocks(elements);
const ALL_LINES = buildSarahLines(blocks);
const TOTAL     = ALL_LINES.length;

// ── State ───────────────────────────────────────────────────────────────────
let learned   = JSON.parse(localStorage.getItem('itl-sarah-learned') || '[]');
// Ensure array length matches
while (learned.length < TOTAL) learned.push(false);

let playlist  = ALL_LINES.map((_,i)=>i); // ordered or shuffled indices
let pos       = 0;   // position in playlist
let revealed  = false;
let skipMode  = false;

function saveLearned() {
  localStorage.setItem('itl-sarah-learned', JSON.stringify(learned));
}

// ── Playlist helpers ─────────────────────────────────────────────────────────
function buildPlaylist() {
  if (skipMode) {
    const pl = ALL_LINES.map((_,i)=>i).filter(i=>!learned[i]);
    return pl.length ? pl : ALL_LINES.map((_,i)=>i);
  }
  return ALL_LINES.map((_,i)=>i);
}

function applyFilter() {
  skipMode = document.getElementById('skip-learned').checked;
  playlist = buildPlaylist();
  pos = 0;
  render();
}

function shuffle() {
  const unlearned = ALL_LINES.map((_,i)=>i).filter(i=>!learned[i]);
  const pool = unlearned.length ? unlearned : ALL_LINES.map((_,i)=>i);
  // Fisher-Yates
  for (let i = pool.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  playlist = pool;
  pos = 0;
  if (skipMode) document.getElementById('skip-learned').checked = false;
  skipMode = false;
  render();
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const lineIdx = playlist[pos];
  const line    = ALL_LINES[lineIdx];
  revealed      = false;

  // Progress meta
  const learnedCount = learned.filter(Boolean).length;
  document.getElementById('counter').textContent =
    `Line ${lineIdx+1} of ${TOTAL}  (${pos+1}/${playlist.length} in session)`;
  document.getElementById('learned-count').textContent =
    `${learnedCount} / ${TOTAL} learned`;
  document.getElementById('bar-fill').style.width = (learnedCount/TOTAL*100)+'%';

  // Dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  ALL_LINES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (learned[i] ? ' learned' : '') + (i===lineIdx ? ' current' : '');
    d.title = `Line ${i+1}`;
    d.onclick = () => { pos = playlist.indexOf(i); if(pos<0){pos=0;} jumpToLineIdx(i); };
    dotsEl.appendChild(d);
  });

  // Context
  const ctxEl = document.getElementById('context-strip');
  ctxEl.innerHTML = '';
  const ctxBlocks = line.context.filter(c => c !== line.cue);
  // Show the last 2 context blocks (stage dirs + speeches)
  const ctxShow = ctxBlocks.slice(-2);
  ctxShow.forEach(c => {
    const div = document.createElement('div');
    div.className = 'ctx-block';
    if (c.type === 'stage_dir') {
      div.innerHTML = `<div class="stage-dir">${escHtml(c.text)}</div>`;
    } else {
      div.innerHTML = `<div class="ctx-who">${escHtml(c.speaker)}</div>
        ${c.parenthetical ? `<div class="ctx-text" style="font-style:italic;font-size:0.85em">${escHtml(c.parenthetical)}</div>` : ''}
        <div class="ctx-text">${escHtml(c.text)}</div>`;
    }
    ctxEl.appendChild(div);
  });

  // Cue
  const cue = line.cue;
  if (cue) {
    if (cue.type === 'stage_dir') {
      document.getElementById('cue-who').textContent = 'STAGE DIRECTION';
      document.getElementById('cue-paren').textContent = '';
      document.getElementById('cue-text').innerHTML = `<em>${escHtml(cue.text)}</em>`;
    } else {
      document.getElementById('cue-who').textContent = cue.speaker;
      document.getElementById('cue-paren').textContent = cue.parenthetical || '';
      document.getElementById('cue-text').textContent = cue.text;
    }
  } else {
    document.getElementById('cue-who').textContent = '— Scene Opening —';
    document.getElementById('cue-paren').textContent = '';
    document.getElementById('cue-text').textContent = '(first speech / no preceding cue)';
  }

  // Sarah's line (hidden)
  document.getElementById('s-who').textContent = line.speaker;
  document.getElementById('s-paren').textContent = line.parenthetical;
  document.getElementById('s-text').textContent = line.text;

  document.getElementById('hint-text').textContent = '';
  document.getElementById('btn-hint').disabled = false;
  document.getElementById('speech-result').classList.remove('show');
  document.getElementById('speech-status').textContent = '';
  if (micListening && recog) { recog.stop(); }

  const box = document.getElementById('sarah-box');
  box.classList.remove('revealed');

  // Learned button — enabled only if already learned or score hits 100%
  const btn = document.getElementById('btn-learned');
  if (learned[lineIdx]) {
    btn.classList.add('on');
    btn.textContent = '✓ Learned';
    btn.disabled = false;
  } else {
    btn.classList.remove('on');
    btn.textContent = '☐ Mark Learned';
    btn.disabled = true;
  }

  // Jump input placeholder
  document.getElementById('jump-in').value = '';
  document.getElementById('jump-in').placeholder = lineIdx+1;
}

function jumpToLineIdx(idx) {
  // Find idx in playlist or add it temporarily
  let p = playlist.indexOf(idx);
  if (p >= 0) { pos = p; }
  else { playlist.splice(pos+1, 0, idx); pos++; }
  render();
}

function revealHint() {
  const idx = playlist[pos];
  const text = ALL_LINES[idx].text;
  const words = text.trim().split(/\s+/).slice(0, 3).join(' ');
  document.getElementById('hint-text').textContent = '"' + words + '…"';
  document.getElementById('btn-hint').disabled = true;
}

function revealLine() {
  if (revealed) return;
  revealed = true;
  document.getElementById('sarah-box').classList.add('revealed');
}

function handleBoxClick() {
  if (revealed) {
    revealed = false;
    document.getElementById('sarah-box').classList.remove('revealed');
  } else {
    revealLine();
  }
}

function go(dir) {
  pos = (pos + dir + playlist.length) % playlist.length;
  render();
}

function toggleLearned() {
  const idx = playlist[pos];
  learned[idx] = !learned[idx];
  saveLearned();
  render();
  if (learned[idx] && skipMode) {
    // Auto-advance when marking learned in skip mode
    setTimeout(() => go(1), 400);
  }
}

function jumpTo() {
  const v = parseInt(document.getElementById('jump-in').value, 10);
  if (!isNaN(v) && v >= 1 && v <= TOTAL) jumpToLineIdx(v-1);
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Speech Recognition ───────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null;
let micListening = false;

(function initSpeech() {
  const btn = document.getElementById('btn-mic');
  if (!SpeechRecognition) {
    btn.disabled = true;
    btn.title = 'Speech recognition not supported in this browser (try Chrome or Edge)';
    document.getElementById('speech-status').textContent = 'Not supported in this browser';
    return;
  }

  recog = new SpeechRecognition();
  recog.lang = 'en-US';
  recog.interimResults = false;
  recog.maxAlternatives = 1;

  recog.onstart = () => {
    micListening = true;
    btn.textContent = '⏹ Stop';
    btn.classList.add('listening');
    document.getElementById('speech-status').textContent = 'Listening…';
    document.getElementById('speech-result').classList.remove('show');
  };

  recog.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    showSpeechResult(transcript);
  };

  recog.onerror = (e) => {
    const msgs = { 'not-allowed': 'Mic access denied', 'no-speech': 'No speech detected', 'network': 'Network error' };
    document.getElementById('speech-status').textContent = msgs[e.error] || ('Error: ' + e.error);
  };

  recog.onend = () => {
    micListening = false;
    btn.textContent = '🎤 Say It';
    btn.classList.remove('listening');
    if (document.getElementById('speech-status').textContent === 'Listening…') {
      document.getElementById('speech-status').textContent = '';
    }
  };
})();

function toggleMic() {
  if (!recog) return;
  if (micListening) {
    recog.stop();
  } else {
    document.getElementById('speech-status').textContent = '';
    recog.start();
  }
}

function normWords(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s']/g, '').trim().split(/\s+/).filter(Boolean);
}

function diffWords(expected, got) {
  const m = expected.length, n = got.length;
  // Build LCS table
  const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = expected[i-1] === got[j-1]
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack to produce diff tokens
  const result = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && expected[i-1] === got[j-1]) {
      result.unshift({type: 'ok', word: expected[i-1]});
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      result.unshift({type: 'bad', word: got[j-1]});  // said but not expected
      j--;
    } else {
      result.unshift({type: 'miss', word: expected[i-1]});  // expected but not said
      i--;
    }
  }
  return result;
}

function showSpeechResult(transcript) {
  const idx = playlist[pos];
  const expected = normWords(ALL_LINES[idx].text.replace(/^\s*\([^)]*\)\s*/i, ''));
  const got      = normWords(transcript);
  const diff     = diffWords(expected, got);

  const okCount  = diff.filter(t => t.type === 'ok').length;
  const pct      = expected.length ? Math.round(okCount / expected.length * 100) : 0;

  const html = diff.map(t => {
    if (t.type === 'ok')   return `<span class="w-ok">${escHtml(t.word)}</span>`;
    if (t.type === 'bad')  return `<span class="w-bad">${escHtml(t.word)}</span>`;
    if (t.type === 'miss') return `<span class="w-miss" title="Click if you said this correctly" onclick="markWordOk(this)">${escHtml(t.word)}</span>`;
  }).join(' ');

  const resultEl = document.getElementById('speech-result');
  resultEl.dataset.expected = expected.length;
  document.getElementById('sr-diff').innerHTML = html;
  updateSpeechScore();
  document.getElementById('speech-status').textContent = '';
  resultEl.classList.add('show');

  // Auto-reveal the line so they can compare
  revealLine();
}

function markWordOk(el) {
  el.className = 'w-ok';
  el.removeAttribute('title');
  el.onclick = null;
  updateSpeechScore();
}

function updateSpeechScore() {
  const resultEl = document.getElementById('speech-result');
  const expected = parseInt(resultEl.dataset.expected, 10) || 0;
  const okCount  = resultEl.querySelectorAll('.w-ok').length;
  const pct      = expected ? Math.round(okCount / expected * 100) : 0;
  const hasMiss  = resultEl.querySelectorAll('.w-miss').length > 0;
  document.getElementById('sr-score').textContent =
    `${okCount} / ${expected} words correct (${pct}%)` +
    (hasMiss ? '  —  tap yellow words to correct false negatives' : '');
  if (pct === 100) {
    const btn = document.getElementById('btn-learned');
    btn.disabled = false;
  }
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT') return;
  if (e.key === 'ArrowLeft')  { go(-1); return; }
  if (e.key === 'ArrowRight') { go(1);  return; }
  if (e.key === ' ') { e.preventDefault(); revealLine(); return; }
  if (e.key === 'l' || e.key === 'L') { const b = document.getElementById('btn-learned'); if (!b.disabled) toggleLearned(); return; }
  if (e.key === 's' || e.key === 'S') { shuffle(); return; }
  if (e.key === 'r' || e.key === 'R') { toggleMic(); return; }
});

// ── Dark mode ────────────────────────────────────────────────────────────────
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('itl-dark', isDark ? '1' : '0');
  document.getElementById('btn-dark').textContent = isDark ? '☀ Light Mode' : '🌙 Dark Mode';
}

// ── Init ─────────────────────────────────────────────────────────────────────
if (localStorage.getItem('itl-dark') === '1') {
  document.body.classList.add('dark');
  document.getElementById('btn-dark').textContent = '☀ Light Mode';
}
playlist = buildPlaylist();
render();
</script>
